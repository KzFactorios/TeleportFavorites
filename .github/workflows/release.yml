name: Release Mod

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.0.15)'
        required: true

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Copy and Stage production files
        run: python .scripts/copy_for_deploy.py

      - name: Strip comments from Lua files
        run: python .scripts/strip_comments.py

      - name: Update info.json version
        run: |
          $v = $env:RELEASE_VERSION
          $infoPath = ".dist/info.json"
          $json = Get-Content $infoPath -Raw | ConvertFrom-Json
          $json.version = $v
          $json | ConvertTo-Json -Depth 32 | Set-Content $infoPath -Encoding UTF8

      - name: Validate changelog
        run: python .scripts/validate_changelog.py

      - name: Wrap .dist contents in versioned mod folder
        run: |
          $modFolder = "TeleportFavorites_$($env:RELEASE_VERSION)"
          $target = ".dist/$modFolder"
          if (-not (Test-Path $target)) { New-Item -ItemType Directory -Path $target | Out-Null }
          Get-ChildItem ".dist" -Force | Where-Object { $_.Name -ne $modFolder } | ForEach-Object {
            Move-Item -Path $_.FullName -Destination $target
          }

      - name: Zip the mod directory
        run: |
          $modFolder = "TeleportFavorites_$($env:RELEASE_VERSION)"
          Compress-Archive -Path ".dist/$modFolder" -DestinationPath "$modFolder.zip" -Force

      - name: Validate zip contains info.json
        run: |
          $modFolder = "TeleportFavorites_$($env:RELEASE_VERSION)"
          $zipPath = "$modFolder.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $expected = "$modFolder/info.json"
            $found = $false
            foreach ($entry in $zip.Entries) {
              if ($entry.FullName -eq $expected) {
                $found = $true
                break
              }
            }
            if (-not $found) {
              throw "Missing $expected inside $zipPath"
            }
          } finally {
            $zip.Dispose()
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeleportFavorites-${{ env.RELEASE_VERSION }}
          path: TeleportFavorites_${{ env.RELEASE_VERSION }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: TeleportFavorites ${{ env.RELEASE_VERSION }}
          body_path: .dist/TeleportFavorites_${{ env.RELEASE_VERSION }}/release_notes.txt
          files: TeleportFavorites_${{ env.RELEASE_VERSION }}.zip

      - name: Output Permanent Download URL
        run: |
          $v = $env:RELEASE_VERSION
          $repo = "${{ github.repository }}"
          $zipUrl = "https://github.com/$repo/releases/download/v$v/TeleportFavorites_$v.zip"
          $releaseUrl = "https://github.com/$repo/releases/tag/v$v"
          Write-Host "=========================================================="
          Write-Host "Mod released successfully!"
          Write-Host "Download URL: $zipUrl"
          Write-Host "Release page: $releaseUrl"
          Write-Host "=========================================================="
          $summary = "## TeleportFavorites $v`n`n**[Download TeleportFavorites_$v.zip]($zipUrl)**`n`n[View release]($releaseUrl)`n"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary -Encoding utf8